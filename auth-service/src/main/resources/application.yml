server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/edusphere_auth
    username: ${DB_USER:edusphere}
    password: ${DB_PASSWORD:edusphere}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

edusphere:
  jwt:
    secret: ${JWT_SECRET:edusphere-jwt-secret-key-min-32-chars!!}
    expiration-ms: 86400000
  encryption:
    key: ${ENCRYPTION_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
