server:
  port: 8084

spring:
  application:
    name: curriculum-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/edusphere_curriculum
    username: ${DB_USER:edusphere}
    password: ${DB_PASSWORD:edusphere}
  jpa:
    hibernate:
      ddl-auto: update

edusphere:
  encryption:
    key: ${ENCRYPTION_KEY:}
