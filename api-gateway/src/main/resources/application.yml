server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://${AUTH_HOST:localhost}:8081
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: http://${USER_HOST:localhost}:8082
          predicates:
            - Path=/api/users/**
        - id: materials-service
          uri: http://${MATERIALS_HOST:localhost}:8083
          predicates:
            - Path=/api/materials/**
        - id: curriculum-service
          uri: http://${CURRICULUM_HOST:localhost}:8084
          predicates:
            - Path=/api/curriculum/**
        - id: adaptive-service
          uri: http://${ADAPTIVE_HOST:localhost}:8085
          predicates:
            - Path=/api/adaptive/**
        - id: grading-service
          uri: http://${GRADING_HOST:localhost}:8086
          predicates:
            - Path=/api/grading/**
        - id: analytics-service
          uri: http://${ANALYTICS_HOST:localhost}:8087
          predicates:
            - Path=/api/analytics/**
        - id: ar-service
          uri: http://${AR_HOST:localhost}:8088
          predicates:
            - Path=/api/ar/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
